name: release
on:
    push:
        tags:
        - 'v*.*.*'        # vX.Y.Z

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "version=$ver" >> $GITHUB_OUTPUT

      # Kernel/image build variables removed; artifacts built locally

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          # For Debian packaging of this repo
          sudo apt-get install -y devscripts debhelper lintian apt-utils

      - name: Build Debian package (-B)
        run: |
          # Ensure debian/changelog has matching version stanza without opening an editor
          export DEBFULLNAME="Servobox CI"
          export DEBEMAIL="ci@users.noreply.github.com"
          export DEBCHANGE_EDITOR=true
          export EDITOR=true
          ver="${{ steps.meta.outputs.version }}"
          if grep -qE "^servobox \(${ver}\)" debian/changelog; then
            echo "debian/changelog already at ${ver}"
          else
            dch --newversion "${ver}" -D unstable -m "Release ${{ steps.meta.outputs.version }}" || true
          fi
          dpkg-buildpackage -us -uc -B
          lintian ../*.deb

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          ver="${{ steps.meta.outputs.version }}"
          if [[ -f CHANGELOG.md ]]; then
            body=$(awk -v ver="$ver" '
              BEGIN{in_section=0}
              # Start capturing at the heading that matches the version (with optional leading v and optional brackets)
              {
                if (match($0, "^#+[[:space:]]*\\[?v?" ver "\\]?([[:space:]]|$)")) { in_section=1; next }
                if (in_section && match($0, "^#+[[:space:]]")) { in_section=0 }
                if (in_section) { print }
              }
            ' CHANGELOG.md)
          fi
          if [[ -z "${body:-}" ]]; then
            body="Release ${ver}"
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo EOF
          } >> $GITHUB_OUTPUT

      # Artifact path gathering removed; uploads limited to built Debian packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            ../*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update APT Repository
        env:
          APT_GPG_PRIVATE_KEY_ASCII_ARMOR: ${{ secrets.APT_GPG_PRIVATE_KEY_ASCII_ARMOR }}
        run: |
          set -euo pipefail

          # Install required tools for APT repository management
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev apt-utils gnupg

          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # --- IMPORTANT ---
          # Keep APT repository state in a dedicated branch, NOT on main.
          # Also: do NOT generate a new GPG key in CI (that rotates the signing key and breaks users).

          # Snapshot repo scripts so we can carry updates onto the apt-repo branch
          tmp="$(mktemp -d)"
          cp -a apt-repo/add-package-to-repo.sh "$tmp/"
          cp -a apt-repo/setup-apt-repo.sh "$tmp/"
          cp -a apt-repo/README.md "$tmp/"

          # Import a stable signing key from secrets
          if [[ -z "${APT_GPG_PRIVATE_KEY_ASCII_ARMOR:-}" ]]; then
            echo "ERROR: Missing secret APT_GPG_PRIVATE_KEY_ASCII_ARMOR."
            echo "Create a long-lived GPG key and add its private key (ASCII-armored) as a repository secret."
            exit 1
          fi
          echo "${APT_GPG_PRIVATE_KEY_ASCII_ARMOR}" | gpg --batch --import

          # Checkout (or create) the apt-repo branch which holds the persistent repo files
          if git ls-remote --exit-code --heads origin apt-repo >/dev/null 2>&1; then
            git fetch origin apt-repo
            git checkout -B apt-repo origin/apt-repo
          else
            git checkout --orphan apt-repo
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p apt-repo/dists/stable/main/binary-amd64
            mkdir -p apt-repo/dists/stable/main/source
            mkdir -p apt-repo/pool/main/s/servobox
          fi

          # Refresh scripts/README on the apt-repo branch (keep dists/ contents intact)
          mkdir -p apt-repo
          cp -a "$tmp/add-package-to-repo.sh" apt-repo/add-package-to-repo.sh
          cp -a "$tmp/setup-apt-repo.sh" apt-repo/setup-apt-repo.sh
          cp -a "$tmp/README.md" apt-repo/README.md
          chmod +x apt-repo/add-package-to-repo.sh apt-repo/setup-apt-repo.sh

          # Export public key for users (served via Pages)
          signing_key_fpr="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ -z "${signing_key_fpr}" ]]; then
            echo "ERROR: no imported signing key fingerprint found."
            exit 1
          fi
          rm -f apt-repo/servobox-apt-key.gpg
          gpg --export "${signing_key_fpr}" > apt-repo/servobox-archive-keyring.gpg
          gpg --armor --export "${signing_key_fpr}" > apt-repo/servobox-archive-keyring.asc

          # Add new package(s) and regenerate metadata
          ./apt-repo/add-package-to-repo.sh ../*.deb

          # Commit and push changes to apt-repo branch
          git add apt-repo/
          git commit -m "Update APT repository for ${{ steps.meta.outputs.tag }}" || echo "No changes to commit"
          git push origin apt-repo